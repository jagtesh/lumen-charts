<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chart MVP — WASM + WebGPU (Interactive)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #202020;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }

        #chart-container {
            width: 900px;
            height: 500px;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            background: #1f1f1f;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: crosshair;
        }

        #status {
            position: fixed;
            top: 16px;
            left: 16px;
            color: #888;
            font-size: 13px;
        }

        #controls {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 900px;
            margin-bottom: 20px;
        }

        .btn {
            background: #333;
            color: #eee;
            border: 1px solid #444;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #444;
        }

        select {
            background: #333;
            color: #eee;
            border: 1px solid #444;
            padding: 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        #help {
            color: #666;
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div id="status">Loading WebGPU chart...</div>
    <div id="chart-container" tabindex="0">
        <canvas id="chart-canvas"></canvas>
    </div>
    <div id="controls">
        <span style="color: #aaa; font-size: 13px;">Chart Type:</span>
        <select id="sel-chart-type">
            <option value="ohlc">OHLC</option>
            <option value="candle">Candle</option>
            <option value="line">Line</option>
            <option value="area">Area</option>
            <option value="hist">Histogram</option>
            <option value="base">Baseline</option>
        </select>
        <button class="btn" id="btn-fit">Fit Content</button>
        <button class="btn" id="btn-overlay">Toggle Overlay</button>
        <button class="btn" id="btn-macd">Toggle MACD</button>
    </div>
    <div id="help">
        Scroll: pan &nbsp;|&nbsp; Ctrl+Scroll: zoom &nbsp;|&nbsp; Drag: pan &nbsp;|&nbsp;
        Drag Y-axis: zoom price &nbsp;|&nbsp; Double-click: fit all &nbsp;|&nbsp;
        Arrow keys: navigate
    </div>

    <script type="module">
        import { createChart } from './pkg/chart_api.js';

        let chart;
        let mainSeries;

        let overlaySeries = null;
        let macdPane = null;
        let macdSeriesList = [];

        let sampleDataCache = null;

        // Generate ~100 bars of AAPL-like data (same LCG as Rust/Swift)
        function generateSampleData() {
            if (sampleDataCache) return sampleDataCache;

            const baseTime = 1704153600; // 2024-01-02 UTC
            const day = 86400;
            let price = 185.0;
            let rng = 42n;
            const data = [];

            function nextRand() {
                rng = (rng * 6364136223846793005n + 1442695040888963407n) & 0xFFFFFFFFFFFFFFFFn;
                return Number(rng >> 33n) / Number(1n << 31n) * 2.0 - 1.0;
            }

            for (let i = 0; i < 100; i++) {
                const time = baseTime + i * day;
                const changePct = nextRand() * 0.02;
                const dailyRange = price * (0.005 + Math.abs(nextRand()) * 0.015);
                const open = price;
                const close = price * (1.0 + changePct);
                const high = Math.max(open, close) + dailyRange * Math.abs(nextRand());
                const low = Math.min(open, close) - dailyRange * Math.abs(nextRand());

                // Store both ohlc and line value (close)
                data.push({ time, open, high, low, close, value: close });
                price = close;
            }
            sampleDataCache = data;
            return data;
        }

        function generateOverlayData() {
            const data = generateSampleData();
            return data.map(d => ({
                time: d.time,
                value: d.close * (1.0 + Math.sin(d.time / 86400.0) * 0.05)
            }));
        }

        // Ported calculateMACD from Swift
        function calculateMACD(bars, fastPeriod = 12, slowPeriod = 26, signalPeriod = 9) {
            function calcEMA(data, period) {
                const k = 2.0 / (period + 1);
                let ema = [];
                let currentEma = 0.0;
                for (let i = 0; i < data.length; i++) {
                    const price = data[i].close;
                    if (i == 0) {
                        currentEma = price;
                    } else {
                        currentEma = price * k + currentEma * (1.0 - k);
                    }
                    ema.push(currentEma);
                }
                return ema;
            }

            const fastEMA = calcEMA(bars, fastPeriod);
            const slowEMA = calcEMA(bars, slowPeriod);
            let macdValues = [];
            for (let i = 0; i < bars.length; i++) {
                macdValues.push({ time: bars[i].time, close: (fastEMA[i] - slowEMA[i]) });
            }

            const signalEMA = calcEMA(macdValues, signalPeriod);

            let macdLine = [];
            let signalLine = [];
            let histogram = [];

            for (let i = 0; i < bars.length; i++) {
                const time = bars[i].time;
                const macd = macdValues[i].close;
                const signal = signalEMA[i];
                const hist = macd - signal;

                macdLine.push({ time, value: macd });
                signalLine.push({ time, value: signal });

                // Color formatting matching swift will be done via options/WASM later 
                // Currently only values are passed
                histogram.push({ time, value: hist });
            }

            return { macdLine, signalLine, histogram };
        }

        // Series type map (dropdown value -> API name)
        const seriesTypeMap = {
            'ohlc': 'ohlc', 'candle': 'candlestick', 'line': 'line',
            'area': 'area', 'hist': 'histogram', 'base': 'baseline'
        };

        async function run() {
            const status = document.getElementById('status');

            try {
                chart = await createChart(document.getElementById('chart-container'));

                // Apply initial options
                chart.applyOptions({
                    layout: { background: { color: "#1f1f1f" }, textColor: "#d1d4dc" },
                    grid: { vertLines: { color: "#333" }, horzLines: { color: "#333" } }
                });

                // Load data ONCE via the primary series API (same as Swift)
                chart.setData(generateSampleData());
                chart.fitContent();

                status.textContent = 'OHLC Bars • 100 bars from JS';
                status.style.color = '#26a69a';
            } catch (e) {
                console.error(e);
                status.textContent = `❌ Error: ${e.message}`;
                status.style.color = '#ef5350';
                return;
            }

            // Wire UI buttons
            const typeNames = {
                'ohlc': 'OHLC Bars', 'candle': 'Candlestick', 'line': 'Line',
                'area': 'Area', 'hist': 'Histogram', 'base': 'Baseline'
            };

            document.getElementById('sel-chart-type').addEventListener('change', (e) => {
                // Just switch the rendering type — data stays the same (like Swift)
                chart.setSeriesType(seriesTypeMap[e.target.value]);
                status.textContent = `${typeNames[e.target.value]} • data from JS`;
            });

            document.getElementById('btn-fit').addEventListener('click', () => {
                chart.fitContent();
            });

            document.getElementById('btn-overlay').addEventListener('click', () => {
                if (overlaySeries) {
                    chart.removeSeries(overlaySeries);
                    overlaySeries = null;
                } else {
                    overlaySeries = chart.addAreaSeries({
                        topColor: 'rgba(26, 153, 230, 0.4)',
                        bottomColor: 'rgba(26, 153, 230, 0.0)',
                        lineColor: 'rgba(26, 153, 230, 1.0)',
                        lineWidth: 2
                    });
                    overlaySeries.setData(generateOverlayData());
                }
            });

            document.getElementById('btn-macd').addEventListener('click', () => {
                if (macdPane) {
                    macdSeriesList.forEach(s => chart.removeSeries(s));
                    macdSeriesList = [];
                    chart.removePane(macdPane);
                    macdPane = null;
                } else {
                    macdPane = chart.addPane(0.3);
                    const macd = calculateMACD(generateSampleData());

                    const histSeries = chart.addHistogramSeries({});
                    histSeries.moveToPane(macdPane);
                    histSeries.setData(macd.histogram); // Colors skipped for brevity 

                    const macdLineSeries = chart.addLineSeries({ color: 'rgb(51, 153, 255)', lineWidth: 1.5 });
                    macdLineSeries.moveToPane(macdPane);
                    macdLineSeries.setData(macd.macdLine);

                    const signalSeries = chart.addLineSeries({ color: 'rgb(255, 153, 51)', lineWidth: 1.5 });
                    signalSeries.moveToPane(macdPane);
                    signalSeries.setData(macd.signalLine);

                    macdSeriesList = [histSeries, macdLineSeries, signalSeries];
                }
            });
        }

        run();
    </script>
</body>

</html>
