<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chart MVP — WASM + WebGPU</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0d;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, sans-serif;
        }
        #chart-container {
            width: 900px;
            height: 600px;
            border: 1px solid #2a2a35;
            border-radius: 8px;
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #status {
            position: fixed;
            top: 16px;
            left: 16px;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div id="status">Loading WebGPU chart...</div>
    <div id="chart-container">
        <canvas id="chart-canvas"></canvas>
    </div>

    <script type="module">
        import init from './pkg/chart_wasm.js';

        async function run() {
            const status = document.getElementById('status');

            // Check WebGPU support
            if (!navigator.gpu) {
                status.textContent = '❌ WebGPU not supported in this browser.';
                status.style.color = '#ef5350';
                return;
            }

            try {
                status.textContent = '⏳ Loading WASM module...';
                await init();
                status.textContent = '✅ Chart rendered via WebGPU!';
                status.style.color = '#26a69a';
            } catch (e) {
                console.error('Failed to initialize:', e);
                status.textContent = `❌ Error: ${e.message}`;
                status.style.color = '#ef5350';
            }
        }

        run();
    </script>
</body>
</html>
